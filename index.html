<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Köye Gel - Tersine Göç ve Dayanışma Ağı</title>
    <!-- Cloudflare Turnstile -->
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
  </head>
  <body>
    <header class="app-header">
      <div class="container">
        <a href="#" class="logo" id="nav-home">
          <!-- Leaf SVG Icon -->
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"></path>
            <path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"></path>
          </svg>
          Köye Gel
        </a>
        <nav style="display: flex; align-items: center;">
          <div id="nav-notifications" style="display: none; position: relative; margin-right: 1.25rem; cursor: pointer; color: var(--text-main);">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
              <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
            </svg>
            <span id="notification-badge" style="display: none; position: absolute; top: -5px; right: -5px; background: var(--error); color: white; font-size: 0.6rem; font-weight: bold; width: 16px; height: 16px; border-radius: 50%; text-align: center; line-height: 16px;">0</span>
          </div>
          
          <!-- Profile Dropdown Container -->
          <div class="profile-dropdown-container" id="profile-dropdown-container" style="display: none; position: relative;">
            <button class="profile-avatar-btn" id="profile-avatar-btn">
              <!-- Empty Person Icon -->
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
              </svg>
            </button>
            <div class="profile-dropdown-menu" id="profile-dropdown-menu">
              <a href="#" class="dropdown-item" id="dropdown-profile">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                  <circle cx="12" cy="7" r="4"></circle>
                </svg>
                Profilim
              </a>
              <a href="#" class="dropdown-item" id="dropdown-listings">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                  <line x1="9" y1="3" x2="9" y2="21"></line>
                </svg>
                İlanlarım
              </a>
              <a href="#" class="dropdown-item" id="dropdown-applications">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                  <polyline points="22 4 12 14.01 9 11.01"></polyline>
                </svg>
                Başvurularım
              </a>
              <hr class="dropdown-divider">
              <a href="#" class="dropdown-item dropdown-item-danger" id="dropdown-logout">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                  <polyline points="16 17 21 12 16 7"></polyline>
                  <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
                Çıkış Yap
              </a>
            </div>
          </div>
          
          <button class="btn btn-secondary" id="nav-login">Giriş Yap</button>
        </nav>
      </div>
    </header>

    <main class="main-content container" id="app">
      <!-- Content will be dynamically loaded here by main.js -->
    </main>

    <!-- Footer containing Feedback Button -->
    <footer class="app-footer" id="app-footer" style="display: none;">
      <div class="container footer-content" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; padding: 1.5rem 0;">
        <p style="margin: 0; color: var(--text-muted); font-size: 0.875rem;">© 2026 Köye Gel - Tersine Göç ve Dayanışma Ağı</p>
        <button class="btn btn-secondary" id="btn-feedback-footer" onclick="window.openFeedbackModal()" style="font-size: 0.85rem; padding: 0.5rem 1rem;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 4px; vertical-align: middle;">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
          </svg>
          Görüş / Öneri Bildir
        </button>
      </div>
    </footer>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
